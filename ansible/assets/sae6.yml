---
# Deploy:  kubectl apply -f sae6.yml
# Verify:  kubectl get pods -o wide -l app=sae6
# Cleanup: kubectl delete -f sae6.yml

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sae6
  labels:
    app: sae6
spec:
  selector:
    matchLabels:
      app: sae6
  template:
    metadata:
      labels:
        app: sae6
    spec:
      tolerations:
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: sae6
          image: docker.io/sutaai/sae6:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /addresses/
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: sae6
spec:
  type: NodePort
  selector:
    app: sae6
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30086
      protocol: TCP
